# German configuration for patient journey testing
# Use with: run_synthea -c src/test/resources/config/synthea_de.properties ...

# Overlay German settings on top of defaults
generate.geography.country_code = DE

# Use US Core IG = false for Germany
exporter.fhir.use_us_core_ig = false

# Transaction bundles for German systems
exporter.fhir.transaction_bundle = true

# FHIR export enabled
exporter.fhir.export = true

# Append numbers to names to make them obviously fake
generate.append_numbers_to_person_names = true
