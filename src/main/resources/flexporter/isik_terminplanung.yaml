---
# ISiK Terminplanung v4 – Flexporter Mapping
# Applies German ISiK (gematik) scheduling profiles to Synthea-generated
# Schedule, Slot, and Appointment resources.
#
# Usage:
#   java -jar synthea.jar --flexporter isik_terminplanung.yaml ...
#
# Requires that the core Synthea fork already generates Schedule, Slot,
# Appointment, ServiceRequest, and Task resources.

name: ISiK Terminplanung v4

applicability: true

actions:

  # ── Profile Tags ─────────────────────────────────────────────────────────────

  - name: Apply ISiK Appointment profile
    profiles:
      - profile: https://gematik.de/fhir/isik/StructureDefinition/ISiKTermin
        applicability: Appointment

  - name: Apply ISiK Schedule profile
    profiles:
      - profile: https://gematik.de/fhir/isik/StructureDefinition/ISiKKalender
        applicability: Schedule

  - name: Apply ISiK Slot profile
    profiles:
      - profile: https://gematik.de/fhir/isik/StructureDefinition/ISiKTerminblock
        applicability: Slot

  # ── ISiK Appointment extensions ──────────────────────────────────────────────
  # ISiKTermin requires:
  #   - status (already set by core)
  #   - start / end (already set by core)
  #   - slot reference (already set by core)
  #   - participant with actor + status (already set by core)
  #   - serviceType (already set by core)
  #
  # ISiK extension: Nachrichtenverlauf (message thread reference)
  # We leave this empty – downstream systems populate it when messages are sent.
  #
  # ISiK mandates priority for appointments, set a default:
  - name: Set Appointment priority
    set_values:
      - applicability: Appointment
        fields:
          - location: Appointment.priority
            value: 5

  # ── ISiK Schedule extensions ─────────────────────────────────────────────────
  # ISiKKalender requires:
  #   - active (already set by core)
  #   - serviceType (already set by core)
  #   - actor (already set by core)
  #
  # Add a specialty coding for the schedule actor
  - name: Set Schedule specialty
    set_values:
      - applicability: Schedule
        fields:
          - location: Schedule.specialty[0].coding[0]
            value:
              system: urn:oid:1.2.276.0.76.5.114
              code: "010"
              display: "Innere Medizin"

  # ── ISiK Slot extensions ────────────────────────────────────────────────────
  # ISiKTerminblock requires:
  #   - schedule reference (already set by core)
  #   - status (already set by core)
  #   - start / end (already set by core)

  # ── ServiceRequest: no ISiK profile, but set German category binding ────────
  - name: Set ServiceRequest category for German context
    set_values:
      - applicability: ServiceRequest
        fields:
          - location: ServiceRequest.category[0].coding[0]
            value:
              system: http://snomed.info/sct
              code: "386053000"
              display: "Evaluation procedure"

  # ── Task: no ISiK profile specifically, but useful metadata ─────────────────
  - name: Set Task businessStatus for completed tasks
    set_values:
      - applicability: Task.status = 'completed'
        fields:
          - location: Task.businessStatus.coding[0]
            value:
              system: http://terminology.hl7.org/CodeSystem/task-performer-function
              code: "performer"
              display: "Task Performer"
